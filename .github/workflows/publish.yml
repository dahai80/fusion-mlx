# Publish to PyPI on release using trusted publishing (OIDC).
#
# No long-lived PyPI token is required. Configure a trusted publisher at
# https://pypi.org/manage/project/dspark-metal/settings/publishing/ pointing
# at this repo + workflow (`publish.yml`) + environment (`pypi`). For the
# very first release, use a "pending" trusted publisher:
# https://docs.pypi.org/trusted-publishers/creating-a-project-with-pending-publisher/
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write   # required for PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: uv build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
