# fusion-mlx venvstacks layer spec (generated from pyproject.toml).
# Git deps pre-built as local wheels (venvstacks requires hashable URLs).
# Source of truth for Python deps: pyproject.toml [project] + [grammar] + [mcp].

[[runtimes]]
name = "cpython-3.11"
python_implementation = "cpython@3.11.10"
requirements = []
platforms = [
    "macosx_arm64",
]

[[frameworks]]
name = "mlx-base"
runtime = "cpython-3.11"
requirements = [
    "mlx>=0.31.2",    "mlx-lm @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/mlx_lm-0.31.3-py3-none-any.whl",    "regex",    "mlx-embeddings @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/mlx_embeddings-0.1.0-py2.py3-none-any.whl",    "transformers==5.0.0",    "mistral-common>=1.10",    "tokenizers>=0.19.0",    "huggingface-hub>=0.23.0",    "numpy>=1.24.0",    "tqdm>=4.66.0",    "pyyaml>=6.0",    "itsdangerous>=2.0",    "jinja2>=3.0",    "sentencepiece",    "tiktoken",    "protobuf",    "requests>=2.28.0",    "socksio>=1.0.0",    "tabulate>=0.9.0",    "psutil>=5.9.0",    "fastapi>=0.108.0",    "pydantic>=2.0.0",    "uvicorn>=0.23.0",    "python-multipart>=0.0.5",    "jsonschema>=4.0.0",    "openai-harmony>=0.0.8,<1.0.0",    "mlx-vlm @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/mlx_vlm-0.5.0-py3-none-any.whl",    "Pillow>=9.0.0",    "dflash-mlx @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/dflash_mlx-0.1.7-py3-none-any.whl",    "sqlalchemy>=2.0.0",    "httpx>=0.24.0",    "aiofiles>=23.0.0",    "appdirs>=1.4.4",    "typer>=0.9.0",    "rich>=13.0.0",    "click>=8.0.0",    "argcomplete>=3.6",    "websockets>=12.0",    "markitdown[pdf,docx,pptx]>=0.1.0",    "xgrammar>=0.1.32",    "mcp>=1.0.0",    "mflux-fusion @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/mflux_fusion-0.18.0-py3-none-any.whl",    "mlx-audio @ file:///Users/dahai/claude-home/fusion-mlx/packaging/_wheels/mlx_audio-0.4.3-py3-none-any.whl",]
platforms = [
    "macosx_arm64",
]
# cv2 is pulled transitively; its bundled dylibs duplicate PIL's. Exclude
# cv2's copies so venvstacks picks a single provider (matches fusion-mlx layer).
dynlib_exclude = [
    "cv2/.dylibs/libavif*",
    "cv2/.dylibs/liblcms2*",
    "cv2/.dylibs/libpng16*",
    "cv2/.dylibs/libtiff*",
    "cv2/.dylibs/libfreetype*",
    "cv2/.dylibs/libharfbuzz*",
    "cv2/.dylibs/liblzma*",
    "cv2/.dylibs/libxcb*",
    "cv2/.dylibs/libXau*",
    # macOS debug-symbol bundles (.dSYM) sit next to the real loadable dylib
    # and shadow it; exclude files inside any .dSYM so the real dylib wins.
    "**/*.dSYM/**",
    # libomp (OpenMP runtime) is bundled by both sklearn/.dylibs and torch/lib.
    # Keep torch's copy (canonical ML provider), drop sklearn's bundled dup.
    "sklearn/.dylibs/libomp*",
]

[tool.uv]
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
]
